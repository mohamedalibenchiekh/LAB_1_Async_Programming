name: Documentation Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README.md
        run: |
          echo "Checking README.md..."
          if [ -f "README.md" ]; then
            echo "✅ README.md exists"

            # Check if README has basic sections
            sections=("Overview" "Prerequisites" "How to Run" "Files and Concepts")
            for section in "${sections[@]}"; do
              if grep -q "^## $section" README.md; then
                echo "✅ Section '$section' found in README"
              else
                echo "❌ Section '$section' missing from README"
                exit 1
              fi
            done

            # Check README length
            lines=$(wc -l < README.md)
            if [ "$lines" -gt 10 ]; then
              echo "✅ README has substantial content ($lines lines)"
            else
              echo "❌ README seems too short ($lines lines)"
              exit 1
            fi
          else
            echo "❌ README.md not found"
            exit 1
          fi

      - name: Check for code examples in README
        run: |
          echo "Checking for code examples in README..."
          if grep -q "```" README.md; then
            echo "✅ README contains code examples"
          else
            echo "⚠️  README does not contain code examples"
          fi

      - name: Validate file references in README
        run: |
          echo "Validating file references in README..."
          # Extract filenames mentioned in README
          mentioned_files=$(grep -o 'Lab1_[^`]*\.js' README.md | sort | uniq)

          for file in $mentioned_files; do
            if [ -f "$file" ]; then
              echo "✅ Referenced file $file exists"
            else
              echo "❌ Referenced file $file does not exist"
              exit 1
            fi
          done

      - name: Check documentation completeness
        run: |
          echo "Checking documentation completeness..."
          js_files=$(ls Lab1_*.js | wc -l)
          documented_files=$(grep -c "Lab1_.*\.js" README.md)

          if [ "$documented_files" -ge "$js_files" ]; then
            echo "✅ All JavaScript files appear to be documented"
          else
            echo "⚠️  Some JavaScript files may not be documented ($documented_files documented, $js_files total)"
          fi
